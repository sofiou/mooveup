<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Moove Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF4D00;--or-d:#CC3D00;--or-l:#FFF3EE;--ch:#2C2C2A;--ch-4:#6E6C66;--ch-1:#F5F4F2;--wh:#fff}
html,body{height:100%;font-family:'Nunito Sans',sans-serif;background:var(--ch-1);color:var(--ch)}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;min-height:100vh}

.brand{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;display:flex;gap:4px;margin-bottom:48px}
.brand span:first-child{color:var(--ch)}
.brand span:last-child{color:var(--or)}

/* Phone illustration */
.phone-wrap{position:relative;margin-bottom:40px}
.phone-404{
  width:160px;height:280px;
  background:var(--ch);border-radius:32px;
  padding:8px;
  box-shadow:0 32px 64px rgba(44,44,42,.25);
  display:flex;flex-direction:column;
  margin:0 auto;
  animation:float 3.5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.phone-notch{width:56px;height:16px;background:var(--ch);border-radius:0 0 10px 10px;margin:0 auto 3px;flex-shrink:0}
.phone-screen-404{
  background:var(--wh);border-radius:24px;flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:12px;
}
.err-code{font-family:'Nunito',sans-serif;font-weight:900;font-size:48px;color:var(--or);line-height:1}
.err-icon{font-size:28px}
.err-msg{font-size:9px;color:var(--ch-4);font-family:'Nunito',sans-serif;font-weight:700;text-align:center;line-height:1.4}

/* Blob déco */
.blob{
  position:fixed;border-radius:50%;background:var(--or);opacity:.06;
  pointer-events:none;
}
.blob-1{width:400px;height:400px;top:-100px;right:-100px;animation:blob 5s ease-in-out infinite}
.blob-2{width:250px;height:250px;bottom:-60px;left:-60px;animation:blob 5s ease-in-out infinite;animation-delay:2.5s}
@keyframes blob{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Text */
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(1.6rem,4vw,2.2rem);margin-bottom:10px}
h1 em{color:var(--or);font-style:normal}
p{font-size:1rem;color:var(--ch-4);max-width:380px;line-height:1.7;margin-bottom:32px}

/* Buttons */
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-main{
  background:var(--or);color:var(--wh);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;
  padding:13px 26px;border-radius:999px;
  box-shadow:0 4px 20px rgba(255,77,0,.28);
  border:none;cursor:pointer;text-decoration:none;
  transition:background .2s,transform .15s;
  display:inline-block;
}
.btn-main:hover{background:var(--or-d);transform:translateY(-2px)}
.btn-ghost{
  background:var(--wh);color:var(--ch);
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;
  padding:13px 26px;border-radius:999px;
  border:2px solid #D8D6D0;
  cursor:pointer;text-decoration:none;
  transition:border-color .2s,color .2s,transform .15s;
  display:inline-block;
}
.btn-ghost:hover{border-color:var(--or);color:var(--or);transform:translateY(-2px)}

/* Hint */
.hint{margin-top:32px;font-size:.82rem;color:#bbb}
.hint a{color:var(--or);text-decoration:none;font-weight:600}
.hint a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="brand"><span>MOOVE</span><span>UP</span></div>

<!-- Phone illustration -->
<div class="phone-wrap">
  <div class="phone-404">
    <div class="phone-notch"></div>
    <div class="phone-screen-404">
      <div class="err-icon">🗺️</div>
      <div class="err-code">404</div>
      <div class="err-msg">Cette page<br>n'existe pas</div>
    </div>
  </div>
</div>

<h1>On s'est <em>perdus</em> en route</h1>
<p>La page que tu cherches n'existe pas ou a été déplacée. Pas de panique — retourne à l'accueil et reprends là où tu t'étais arrêté.</p>

<div class="btns">
  <a href="/mooveup/" class="btn-main">← Retour à l'accueil</a>
  <a href="/mooveup/demo.html" class="btn-ghost">▶ Voir la démo</a>
</div>

<p class="hint">
  Tu cherches quelque chose en particulier ?
  <a href="/mooveup/#contact">Contacte-nous →</a>
</p>

</body>
</html>
